name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Get-Content requirements.txt |
            Where-Object { $_ -and $_ -notmatch '^(matlabengine|pywin32|pywin32-ctypes)==' } |
            Set-Content requirements.ci.txt
          pip install -r requirements.ci.txt
          if ($LASTEXITCODE -ne 0) { exit 1 }
          pip install pytest
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run tests
        shell: pwsh
        # MATLAB Engine and network APIs are unavailable on hosted runners;
        # the matlab/live integration tests run locally. See conftest.py.
        run: python -m pytest -q -m "not matlab and not live"
